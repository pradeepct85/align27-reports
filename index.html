<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>align27 — Daily Reports Bundle</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #080d1c; --surface: #141a33; --surface-2: #1b2247;
    --border: rgba(255,255,255,0.08); --text: #e6e9f5; --muted: #8b92ad;
    --violet: #8b5cf6; --pink: #ec4899; --amber: #f59e0b; --cyan: #06b6d4;
    --green: #22c55e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; height: 100%; overflow: hidden; }
  .app { display: flex; flex-direction: column; height: 100vh; }
  .header {
    position: relative; padding: 14px 22px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
    overflow: hidden; flex-shrink: 0;
  }
  .header::before, .header::after {
    content: ""; position: absolute; border-radius: 50%;
    filter: blur(60px); opacity: 0.25; pointer-events: none;
  }
  .header::before { width: 240px; height: 240px; background: var(--violet); top: -100px; right: 10%; }
  .header::after { width: 200px; height: 200px; background: var(--pink); top: -60px; right: 0; }
  .header-content { position: relative; z-index: 1; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; flex: 1; }
  .logo {
    font-size: 17px; font-weight: 700;
    background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 50%, #f59e0b 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  .logo-sub { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; margin-top: 2px; }
  .picker-group { display: flex; align-items: center; gap: 8px; }
  .picker-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
  select, button {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
  }
  select:hover, button:hover { background: rgba(255,255,255,0.08); border-color: rgba(139,92,246,0.4); }
  select:focus { outline: none; border-color: var(--violet); }
  button.primary {
    background: linear-gradient(135deg, var(--violet), var(--pink));
    border: none; font-weight: 600;
  }
  button.primary:hover { opacity: 0.92; }
  button.nav { padding: 8px 12px; min-width: 36px; }
  .header-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }
  .meta-stat { font-size: 11px; color: var(--muted); }
  .meta-stat b { color: var(--text); font-weight: 600; }
  .badge { font-size: 11px; padding: 3px 8px; border-radius: 999px; background: rgba(34,197,94,0.12); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
  .frame-wrap { flex: 1; position: relative; background: var(--bg); overflow: hidden; }
  iframe { width: 100%; height: 100%; border: none; background: var(--bg); display: block; }
  @media (max-width: 720px) {
    .header { padding: 10px 14px; gap: 10px; }
    .header-right { margin-left: 0; }
    .logo-sub { display: none; }
  }
</style>
</head>

        <button class="primary" id="latestBtn" title="Jump to most recent">Latest</button>

        <span class="badge">11 reports embedded</span>

    </div>
  </header>

  <main class="frame-wrap">

</div>

const picker = document.getElementById('datePicker');
const frame = document.getElementById('reportFrame');
const metaStat = document.getElementById('metaStat');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const latestBtn = document.getElementById('latestBtn');

const ALL_DATES = Array.from(picker.options).map(o => o.value);

function fmtNice(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${days[d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function loadReport(dateStr) {
  const b64 = REPORTS[dateStr];
  if (!b64) return;
  // Decode base64 -> UTF-8 HTML and put into iframe srcdoc
  const html = atob(b64).split('').map(c => c.charCodeAt(0)).reduce((acc, c) => acc + String.fromCharCode(c), '');
  // Actually use proper UTF-8 decoder
  const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const decoded = new TextDecoder('utf-8').decode(bytes);
  frame.srcdoc = decoded;
  metaStat.innerHTML = `<b>${fmtNice(dateStr)}</b>`;
  picker.value = dateStr;
  try { localStorage.setItem('align27_last_date', dateStr); } catch(e) {}
  history.replaceState(null, '', '#' + dateStr);
  updateNavButtons();
}

function updateNavButtons() {
  const idx = ALL_DATES.indexOf(picker.value);
  prevBtn.disabled = idx >= ALL_DATES.length - 1;
  nextBtn.disabled = idx <= 0;
  prevBtn.style.opacity = prevBtn.disabled ? 0.4 : 1;
  nextBtn.style.opacity = nextBtn.disabled ? 0.4 : 1;
}

picker.addEventListener('change', () => loadReport(picker.value));
latestBtn.addEventListener('click', () => loadReport(ALL_DATES[0]));
prevBtn.addEventListener('click', () => {
  const idx = ALL_DATES.indexOf(picker.value);
  if (idx < ALL_DATES.length - 1) loadReport(ALL_DATES[idx + 1]);
});
nextBtn.addEventListener('click', () => {
  const idx = ALL_DATES.indexOf(picker.value);
  if (idx > 0) loadReport(ALL_DATES[idx - 1]);
});

// Keyboard shortcuts: ← →
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'SELECT') return;
  if (e.key === 'ArrowLeft' && !prevBtn.disabled) prevBtn.click();
  if (e.key === 'ArrowRight' && !nextBtn.disabled) nextBtn.click();
});

// Hash routing
window.addEventListener('hashchange', () => {
  const h = location.hash.replace('#','').trim();
  if (ALL_DATES.includes(h)) loadReport(h);
});

// Initial load: hash > last viewed > latest
let initial = ALL_DATES[0];
const hash = location.hash.replace('#','').trim();
if (hash && ALL_DATES.includes(hash)) initial = hash;
else {
  try {
    const last = localStorage.getItem('align27_last_date');
    if (last && ALL_DATES.includes(last)) initial = last;
  } catch(e) {}
}
loadReport(initial);
</script>
